<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IPv4 Sniffer</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body {
  margin: 0;
  font-family: monospace;
  display: flex;
  height: 100vh;
  background: #0f0f0f;
  color: #00ff99;
}

/* TIMELINE */

#timeline {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: #111;
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 8px;
  white-space: nowrap;
}

/* LEFT */
#left {
  width: 40%;
  margin-top: 80px;
  border-right: 1px solid #333;
  display: flex;
  flex-direction: column;
  
}

#table {
  overflow-y: auto;
  flex: 1;
  padding: 10px;
}

.packet-item {
  padding: 8px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.packet-item:hover {
  background: #1a1a1a;
}

/* RIGHT */
#right {
  flex: 1;
  margin-top: 80px;
  padding: 10px;
  overflow-y: auto;
  white-space: pre;
}
</style>
</head>

<body>

<div id="timeline"></div>
<div id="left">

  <!--  FILTRO (ARRIBA DE LA LISTA) -->
  <input id="filterInput"
         placeholder="Filtrar: ipv4, tcp, udp, ip..."
         style="width:100%; padding:8px; background:#111; color:#0f0; border:1px solid #333;">

  <div id="table"></div>

</div>
<div id="right">
Selecciona un paquete...
</div>

<script src="app.js"></script>

</body>
</html>
